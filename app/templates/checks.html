{% extends "base.html" %}

{% block title %}達成項目 - {{ task.title }}{% endblock %}

{% block head %}
<style>
    .checks-header {
        display: flex;
        align-items: center;
        gap: 1rem;
        margin-bottom: 1.5rem;
    }
    .back-link {
        display: inline-flex;
        align-items: center;
        gap: 0.375rem;
        padding: 0.4rem 0.875rem;
        background: #ffffff;
        color: #e60012;
        border: 2px solid #e60012;
        border-radius: 6px;
        font-size: 0.85rem;
        font-weight: 600;
        text-decoration: none;
        transition: all 0.2s;
    }
    .back-link:hover {
        background: #e60012;
        color: #ffffff;
    }
    .checks-title {
        font-size: 1.25rem;
        font-weight: 700;
        color: #333;
    }

    /* Add form */
    .add-form-card {
        background: #fff;
        border: 2px solid #e8e8e8;
        border-radius: 12px;
        padding: 1.25rem;
        margin-bottom: 1.5rem;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
    }
    .add-form-card h3 {
        font-size: 0.95rem;
        font-weight: 700;
        color: #333;
        margin-bottom: 1rem;
        padding-bottom: 0.5rem;
        border-bottom: 2px solid #e60012;
    }
    .form-row {
        display: flex;
        gap: 0.75rem;
        margin-bottom: 0.75rem;
        align-items: flex-start;
        flex-wrap: wrap;
    }
    .form-group {
        display: flex;
        flex-direction: column;
        gap: 0.25rem;
        flex: 1;
        min-width: 200px;
    }
    .form-group.title-group {
        flex: 2;
        min-width: 300px;
    }
    .form-group label {
        font-size: 0.75rem;
        font-weight: 600;
        color: #666;
        text-transform: uppercase;
        letter-spacing: 0.05em;
    }
    .form-group input {
        padding: 0.5rem 0.75rem;
        font-size: 0.9rem;
        border: 2px solid #d9d9d9;
        border-radius: 6px;
        background: #fff;
        color: #484848;
        outline: none;
        transition: border-color 0.2s;
    }
    .form-group input:focus {
        border-color: #e60012;
    }
    .btn-add {
        padding: 0.5rem 1.25rem;
        background: #e60012;
        color: #fff;
        border: none;
        border-radius: 6px;
        font-size: 0.9rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        align-self: flex-end;
        white-space: nowrap;
    }
    .btn-add:hover { background: #c4000f; }
    .form-hint {
        font-size: 0.7rem;
        color: #999;
    }

    /* Stats */
    .checks-count {
        font-size: 0.85rem;
        color: #999;
        margin-bottom: 1rem;
    }
    .checks-count strong {
        color: #e60012;
    }

    /* Table */
    .checks-table-wrap {
        background: #fff;
        border: 1px solid #e8e8e8;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
    }
    .checks-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.85rem;
    }
    .checks-table thead {
        background: #fafafa;
        border-bottom: 2px solid #e60012;
    }
    .checks-table th {
        padding: 0.625rem 0.75rem;
        text-align: left;
        font-weight: 700;
        color: #333;
        font-size: 0.8rem;
        white-space: nowrap;
    }
    .checks-table td {
        padding: 0.5rem 0.75rem;
        border-bottom: 1px solid #f0f0f0;
        vertical-align: top;
        color: #484848;
    }
    .checks-table tr:last-child td {
        border-bottom: none;
    }
    .checks-table tr:hover {
        background: #fef8f8;
    }
    .checks-table tr.checked {
        background: #fafafa;
    }
    .checks-table tr.checked td {
        opacity: 0.55;
    }
    .checks-table tr.checked td:first-child {
        opacity: 1;
    }

    /* Check toggle in table */
    .check-toggle {
        width: 22px;
        height: 22px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.85rem;
        border-radius: 50%;
        border: 2px solid #aaa;
        color: #aaa;
        cursor: pointer;
        transition: all 0.15s;
        background: #fff;
        margin: 0 auto;
    }
    .check-toggle:hover {
        border-color: #0ab44a;
        color: #0ab44a;
        transform: scale(1.1);
    }
    tr.checked .check-toggle {
        background: #0ab44a;
        border-color: #0ab44a;
        color: #fff;
        font-weight: 700;
    }
    tr.checked .check-toggle:hover {
        background: #aaa;
        border-color: #aaa;
    }

    /* Title cell */
    .checks-table .cell-title {
        font-weight: 600;
        color: #333;
    }
    tr.checked .cell-title {
        text-decoration: line-through;
        color: #aaa;
    }
    .cell-date {
        font-size: 0.75rem;
        color: #999;
        white-space: nowrap;
    }

    /* Tag pills in table */
    .cell-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 0.25rem;
    }
    .tag-pill {
        font-size: 0.7rem;
        padding: 0.1rem 0.45rem;
        border-radius: 10px;
        color: #fff;
        white-space: nowrap;
    }
    .tag-pill.inputs { background: #0068b7; }
    .tag-pill.outputs { background: #0ab44a; }
    .tag-pill.results { background: #f5a623; }
    .tag-pill.evidences { background: #9b59b6; }

    /* Action buttons */
    .btn-edit, .btn-delete {
        padding: 0.2rem 0.5rem;
        font-size: 0.7rem;
        font-weight: 600;
        border: 1.5px solid #d9d9d9;
        border-radius: 4px;
        cursor: pointer;
        transition: all 0.15s;
        background: #fff;
    }
    .btn-edit { color: #0068b7; border-color: #0068b7; }
    .btn-edit:hover { background: #0068b7; color: #fff; }
    .btn-delete { color: #e60012; border-color: #e60012; }
    .btn-delete:hover { background: #e60012; color: #fff; }
    .cell-actions {
        display: flex;
        gap: 0.25rem;
        white-space: nowrap;
    }

    /* Edit row */
    .edit-row { display: none; }
    .edit-row.active { display: table-row; }
    .edit-row td {
        padding: 0.75rem;
        background: #fafafa;
        border-bottom: 2px solid #e8e8e8;
    }
    .edit-inline {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
        align-items: flex-end;
    }
    .edit-inline .form-group {
        min-width: 140px;
        flex: 1;
    }
    .edit-inline .form-group input {
        padding: 0.35rem 0.5rem;
        font-size: 0.8rem;
    }
    .btn-save {
        padding: 0.35rem 0.75rem;
        background: #0ab44a;
        color: #fff;
        border: none;
        border-radius: 4px;
        font-size: 0.75rem;
        font-weight: 600;
        cursor: pointer;
    }
    .btn-save:hover { background: #078a39; }
    .btn-cancel {
        padding: 0.35rem 0.75rem;
        background: #fff;
        color: #666;
        border: 1.5px solid #d9d9d9;
        border-radius: 4px;
        font-size: 0.75rem;
        font-weight: 600;
        cursor: pointer;
    }
    .btn-cancel:hover { border-color: #999; color: #333; }

    .empty-message {
        text-align: center;
        color: #a0a0a0;
        padding: 3rem;
        font-size: 0.95rem;
    }
</style>
{% endblock %}

{% block content %}
<div class="checks-header">
    <a href="/gantt" class="back-link">&#9664; ガントチャートへ戻る</a>
    <span class="checks-title">{{ task.title }} - 達成項目</span>
</div>

<!-- Add form -->
<div class="add-form-card">
    <h3>新しい達成項目を追加</h3>
    <form id="add-check-form">
        <div class="form-row">
            <div class="form-group title-group">
                <label for="new-title">タイトル *</label>
                <input type="text" id="new-title" placeholder="達成項目のタイトル" required>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="new-inputs">インプット</label>
                <input type="text" id="new-inputs" placeholder="カンマ区切りで入力">
                <span class="form-hint">例: 設計書, 要件定義書</span>
            </div>
            <div class="form-group">
                <label for="new-outputs">アウトプット</label>
                <input type="text" id="new-outputs" placeholder="カンマ区切りで入力">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="new-results">成果</label>
                <input type="text" id="new-results" placeholder="カンマ区切りで入力">
            </div>
            <div class="form-group">
                <label for="new-evidences">エビデンス</label>
                <input type="text" id="new-evidences" placeholder="カンマ区切りで入力">
            </div>
        </div>
        <div class="form-row">
            <button type="submit" class="btn-add">追加</button>
        </div>
    </form>
</div>

<div class="checks-count" id="checks-count"></div>

<div class="checks-table-wrap">
    <table class="checks-table" id="checks-table">
        <thead>
            <tr>
                <th style="width:40px; text-align:center;">完了</th>
                <th>タイトル</th>
                <th>インプット</th>
                <th>アウトプット</th>
                <th>成果</th>
                <th>エビデンス</th>
                <th style="width:90px;">完了日</th>
                <th style="width:80px;"></th>
            </tr>
        </thead>
        <tbody id="checks-body"></tbody>
    </table>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener("DOMContentLoaded", () => {
    const taskId = {{ task.id }};
    const tbody = document.getElementById("checks-body");
    const countEl = document.getElementById("checks-count");
    const form = document.getElementById("add-check-form");

    let checkItems = {{ check_items | tojson }};

    function parseCSV(val) {
        if (!val || !val.trim()) return [];
        return val.split(",").map(s => s.trim()).filter(s => s.length > 0);
    }

    function fmtDate(iso) {
        if (!iso) return "";
        const d = new Date(iso);
        return `${d.getMonth()+1}/${d.getDate()}`;
    }

    function escHtml(str) {
        const div = document.createElement("div");
        div.textContent = str;
        return div.innerHTML;
    }

    function renderPills(arr, cls) {
        if (!arr || arr.length === 0) return '<span style="color:#ccc;">—</span>';
        return arr.map(v => `<span class="tag-pill ${cls}">${escHtml(v)}</span>`).join(" ");
    }

    function updateCount() {
        const total = checkItems.length;
        const checked = checkItems.filter(i => i.is_checked).length;
        countEl.innerHTML = `<strong>${checked}</strong> / ${total} 完了`;
    }

    function renderTable() {
        updateCount();
        tbody.innerHTML = "";

        if (checkItems.length === 0) {
            tbody.innerHTML = '<tr><td colspan="8" class="empty-message">達成項目がまだありません</td></tr>';
            return;
        }

        checkItems.forEach((item, idx) => {
            // Data row
            const tr = document.createElement("tr");
            tr.className = item.is_checked ? "checked" : "";
            tr.innerHTML = `
                <td style="text-align:center;">
                    <div class="check-toggle" data-id="${item.id}">${item.is_checked ? "&#10003;" : ""}</div>
                </td>
                <td class="cell-title">${escHtml(item.title)}</td>
                <td><div class="cell-tags">${renderPills(item.inputs, "inputs")}</div></td>
                <td><div class="cell-tags">${renderPills(item.outputs, "outputs")}</div></td>
                <td><div class="cell-tags">${renderPills(item.results, "results")}</div></td>
                <td><div class="cell-tags">${renderPills(item.evidences, "evidences")}</div></td>
                <td class="cell-date">${fmtDate(item.checked_at)}</td>
                <td>
                    <div class="cell-actions">
                        <button class="btn-edit" data-idx="${idx}">編集</button>
                        <button class="btn-delete" data-id="${item.id}">削除</button>
                    </div>
                </td>
            `;
            tbody.appendChild(tr);

            // Edit row (hidden by default)
            const editTr = document.createElement("tr");
            editTr.className = "edit-row";
            editTr.id = `edit-row-${item.id}`;
            editTr.innerHTML = `
                <td colspan="8">
                    <div class="edit-inline">
                        <div class="form-group">
                            <label>タイトル</label>
                            <input type="text" class="edit-title" value="${escHtml(item.title)}">
                        </div>
                        <div class="form-group">
                            <label>インプット</label>
                            <input type="text" class="edit-inputs" value="${(item.inputs||[]).join(", ")}">
                        </div>
                        <div class="form-group">
                            <label>アウトプット</label>
                            <input type="text" class="edit-outputs" value="${(item.outputs||[]).join(", ")}">
                        </div>
                        <div class="form-group">
                            <label>成果</label>
                            <input type="text" class="edit-results" value="${(item.results||[]).join(", ")}">
                        </div>
                        <div class="form-group">
                            <label>エビデンス</label>
                            <input type="text" class="edit-evidences" value="${(item.evidences||[]).join(", ")}">
                        </div>
                        <button type="button" class="btn-save" data-id="${item.id}">保存</button>
                        <button type="button" class="btn-cancel" data-id="${item.id}">キャンセル</button>
                    </div>
                </td>
            `;
            tbody.appendChild(editTr);
        });

        // Toggle check
        tbody.querySelectorAll(".check-toggle").forEach(el => {
            el.addEventListener("click", async () => {
                const id = parseInt(el.dataset.id);
                const item = checkItems.find(i => i.id === id);
                const newState = !item.is_checked;
                try {
                    const resp = await fetch(`/api/v1/checks/${id}`, {
                        method: "PUT",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ is_checked: newState }),
                    });
                    if (!resp.ok) { alert("更新に失敗しました"); return; }
                    const updated = await resp.json();
                    checkItems[checkItems.findIndex(i => i.id === id)] = updated;
                    renderTable();
                } catch (err) { alert("通信エラー"); }
            });
        });

        // Edit toggle
        tbody.querySelectorAll(".btn-edit").forEach(el => {
            el.addEventListener("click", () => {
                const idx = parseInt(el.dataset.idx);
                const item = checkItems[idx];
                document.getElementById(`edit-row-${item.id}`).classList.toggle("active");
            });
        });

        // Save edit
        tbody.querySelectorAll(".btn-save").forEach(el => {
            el.addEventListener("click", async () => {
                const id = parseInt(el.dataset.id);
                const editRow = document.getElementById(`edit-row-${id}`);
                const title = editRow.querySelector(".edit-title").value.trim();
                if (!title) { alert("タイトルは必須です"); return; }
                const body = {
                    title,
                    inputs: parseCSV(editRow.querySelector(".edit-inputs").value),
                    outputs: parseCSV(editRow.querySelector(".edit-outputs").value),
                    results: parseCSV(editRow.querySelector(".edit-results").value),
                    evidences: parseCSV(editRow.querySelector(".edit-evidences").value),
                };
                try {
                    const resp = await fetch(`/api/v1/checks/${id}`, {
                        method: "PUT",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(body),
                    });
                    if (!resp.ok) { alert("更新に失敗しました"); return; }
                    const updated = await resp.json();
                    checkItems[checkItems.findIndex(i => i.id === id)] = updated;
                    renderTable();
                } catch (err) { alert("通信エラー"); }
            });
        });

        // Cancel edit
        tbody.querySelectorAll(".btn-cancel").forEach(el => {
            el.addEventListener("click", () => {
                document.getElementById(`edit-row-${el.dataset.id}`).classList.remove("active");
            });
        });

        // Delete
        tbody.querySelectorAll(".btn-delete").forEach(el => {
            el.addEventListener("click", async () => {
                if (!confirm("この達成項目を削除しますか？")) return;
                const id = parseInt(el.dataset.id);
                try {
                    const resp = await fetch(`/api/v1/checks/${id}`, { method: "DELETE" });
                    if (!resp.ok) { alert("削除に失敗しました"); return; }
                    checkItems = checkItems.filter(i => i.id !== id);
                    renderTable();
                } catch (err) { alert("通信エラー"); }
            });
        });
    }

    // Add form
    form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const title = document.getElementById("new-title").value.trim();
        if (!title) return;
        const body = {
            title,
            inputs: parseCSV(document.getElementById("new-inputs").value),
            outputs: parseCSV(document.getElementById("new-outputs").value),
            results: parseCSV(document.getElementById("new-results").value),
            evidences: parseCSV(document.getElementById("new-evidences").value),
        };
        try {
            const resp = await fetch(`/api/v1/tasks/${taskId}/checks`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(body),
            });
            if (!resp.ok) { alert("追加に失敗しました"); return; }
            const created = await resp.json();
            checkItems.push(created);
            renderTable();
            form.reset();
        } catch (err) { alert("通信エラー"); }
    });

    renderTable();
});
</script>
{% endblock %}
