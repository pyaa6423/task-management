{% extends "base.html" %}

{% block title %}Gantt Chart - Task Management{% endblock %}

{% block head %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/frappe-gantt@0.6.1/dist/frappe-gantt.min.css">
{% endblock %}

{% block content %}
<div class="gantt-controls">
    <label for="project-select">プロジェクト:</label>
    <select id="project-select">
        <option value="">全プロジェクト</option>
        {% for project in projects %}
        <option value="{{ project.id }}">{{ project.name }}</option>
        {% endfor %}
    </select>

    <div class="theme-selector">
        <label>カラー:</label>
        <div class="theme-swatches">
            <span class="theme-swatch active" data-theme="nintendo" style="background: #e60012;" title="Nintendo"></span>
            <span class="theme-swatch" data-theme="mario" style="background: #049cd8;" title="Mario"></span>
            <span class="theme-swatch" data-theme="splatoon" style="background: #2ae0c8;" title="Splatoon"></span>
            <span class="theme-swatch" data-theme="zelda" style="background: #2d8a4e;" title="Zelda"></span>
            <span class="theme-swatch" data-theme="kirby" style="background: #f4a4b8;" title="Kirby"></span>
            <span class="theme-swatch" data-theme="monochrome" style="background: #484848;" title="Monochrome"></span>
        </div>
    </div>

    <div class="view-modes">
        <button data-mode="Day" class="active">Day</button>
        <button data-mode="Week">Week</button>
        <button data-mode="Month">Month</button>
    </div>
</div>
<div id="gantt-container">
    <p class="placeholder">読み込み中...</p>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/frappe-gantt.min.js"></script>
<script src="/static/gantt.js"></script>
{% endblock %}
