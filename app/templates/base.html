<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Task Management{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
    {% block head %}{% endblock %}
</head>
<body>
    <header>
        <h1><a href="/gantt">Task Management</a></h1>
        <nav style="display:flex;gap:1rem;margin-top:0.25rem;">
            <a href="/gantt" style="color:#e60012;font-weight:600;font-size:0.85rem;text-decoration:none;">ガントチャート</a>
            <a href="/milestones" style="color:#e60012;font-weight:600;font-size:0.85rem;text-decoration:none;">マイルストーン</a>
        </nav>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    {% block scripts %}{% endblock %}
</body>
</html>
